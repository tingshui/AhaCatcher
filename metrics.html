<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aha! Catcher — Metrics</title>
  <style>
    :root {
      --text: #1a1a18;
      --muted: #5c5a54;
      --border: #ddd8cf;
      --bg: #faf9f6;
      --accent: #2d6a4f;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      padding: 1.25rem 1.5rem 2.5rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      max-width: 56rem;
      margin-inline: auto;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.35rem; }
    .sub { color: var(--muted); font-size: 0.92rem; margin: 0 0 1.25rem; }
    a { color: var(--accent); }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.65rem;
    }
    dl.grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.35rem 1.25rem;
      margin: 0;
      font-size: 0.95rem;
    }
    dl.grid dt { color: var(--muted); margin: 0; }
    dl.grid dd { margin: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      text-align: left;
    }
    th { background: #f3f1ec; font-weight: 600; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .err { color: #b00020; }
    button {
      margin-top: 0.75rem;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #f5f3ef; }
  </style>
</head>
<body>
  <h1>Aha! Catcher metrics</h1>
  <p class="sub">
    Local JSONL only — no transcript text stored.
    <a href="./">← Back to app</a>
    · Feedback rule: if you change category before save, that counts as a correction; leaving the classifier’s category counts as implicit acceptance.
  </p>
  <div id="root"></div>
  <button type="button" id="reloadBtn">Reload</button>

  <script>
(function () {
  const API_BASE = "";
  const cats = ["life-daily", "inner", "career-learning", "reading", "pilates", "unsorted"];
  const root = document.getElementById("root");
  const reloadBtn = document.getElementById("reloadBtn");

  function labelCat(c) {
    const m = {
      "life-daily": "01 Daily",
      inner: "02 Inner",
      "career-learning": "03 Career",
      reading: "04 Reading",
      pilates: "05 Pilates",
      unsorted: "06 Unsorted",
    };
    return m[c] || c;
  }

  async function load() {
    root.innerHTML = "<p>Loading…</p>";
    let s;
    try {
      const res = await fetch(`${API_BASE}/api/metrics/summary`);
      s = await res.json();
    } catch (e) {
      root.innerHTML = `<p class="err">Failed to fetch: ${e.message || String(e)}</p>`;
      return;
    }
    if (!s.enabled) {
      root.innerHTML =
        `<div class="card"><p class="err">${s.message || "Metrics disabled."}</p>` +
        `<p>Set <code>AHA_CATCHER_METRICS_JSONL</code> to a file path or leave unset for default <code>ahacatcher/data/metrics.jsonl</code>. Use value <code>off</code> to disable.</p></div>`;
      return;
    }

    const ev = s.evaluation || {};
    const ratePct =
      ev.implicit_agreement_rate != null
        ? (ev.implicit_agreement_rate * 100).toFixed(1) + "%"
        : "— (need saves after classify)";

    let html = "";
    html += `<div class="card"><h2>Overview</h2><dl class="grid">`;
    html += `<dt>Metrics file</dt><dd><code style="word-break:break-all">${s.metrics_file || ""}</code></dd>`;
    html += `<dt>Rows scanned</dt><dd>${s.row_count_scanned ?? 0}</dd>`;
    html += `<dt>Voice captures (transcribe OK)</dt><dd>${s.transcribe_ok_count ?? 0}</dd>`;
    html += `<dt>Classifier API events</dt><dd>${s.classify_event_count ?? 0}</dd>`;
    html += `<dt>Research summaries</dt><dd>${s.research_ok_count ?? 0}</dd>`;
    html += `<dt>Notes (unique sessions saved)</dt><dd>${s.notes_saved_sessions ?? 0}</dd>`;
    html += `</dl></div>`;

    html += `<div class="card"><h2>Implicit accuracy (category)</h2><dl class="grid">`;
    html += `<dt>Notes with classifier baseline</dt><dd>${ev.notes_with_classifier_baseline ?? 0}</dd>`;
    html += `<dt>Implicitly accepted</dt><dd>${ev.implicitly_accepted ?? 0}</dd>`;
    html += `<dt>User corrected</dt><dd>${ev.user_corrected_category ?? 0}</dd>`;
    html += `<dt>Agreement rate</dt><dd><strong>${ratePct}</strong></dd>`;
    html += `<dt>Definition</dt><dd>${ev.definition || ""}</dd>`;
    html += `</dl></div>`;

    const pc = s.predicted_category_counts || {};
    html += `<div class="card"><h2>Classifier output (histogram)</h2><table><thead><tr><th>Category</th><th class="num">Count</th></tr></thead><tbody>`;
    for (const c of cats) {
      html += `<tr><td>${labelCat(c)}</td><td class="num">${pc[c] ?? 0}</td></tr>`;
    }
    html += `</tbody></table></div>`;

    const fc = s.final_category_counts || {};
    html += `<div class="card"><h2>Final note category (last save per session)</h2><table><thead><tr><th>Category</th><th class="num">Count</th></tr></thead><tbody>`;
    for (const c of cats) {
      html += `<tr><td>${labelCat(c)}</td><td class="num">${fc[c] ?? 0}</td></tr>`;
    }
    html += `</tbody></table></div>`;

    const conf = s.confusion_predicted_vs_final || {};
    html += `<div class="card"><h2>Predicted (row) vs final (column)</h2>`;
    html += `<table><thead><tr><th></th>`;
    for (const c of cats) {
      html += `<th class="num">${labelCat(c).replace(/^.. /, "")}</th>`;
    }
    html += `</tr></thead><tbody>`;
    for (const pr of cats) {
      html += `<tr><th>${labelCat(pr)}</th>`;
      const row = conf[pr] || {};
      for (const fn of cats) {
        const n = row[fn] ?? 0;
        html += `<td class="num">${n || "·"}</td>`;
      }
      html += `</tr>`;
    }
    html += `</tbody></table><p style="font-size:0.82rem;color:var(--muted);margin:0.6rem 0 0">Only rows where classification succeeded before save.</p></div>`;

    root.innerHTML = html;
  }

  reloadBtn.addEventListener("click", load);
  load();
})();
  </script>
</body>
</html>
